site_name: AIONE
site_description: Commercial software and hardware company
site_url: https://miaoreynolds.github.io/aione-lab-site/

theme:
  name: material
  language: en
  logo: assets/logo-mark.svg
  favicon: assets/favicon.svg
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Software Projects: software-projects.md
  - Hardware Projects: hardware-projects.md
  - About: about.md
  - Contact Us: contact-us.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css
